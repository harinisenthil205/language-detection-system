<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { font-family: Arial; background:#f5f6fa; }

.container {
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
}
button {
    padding:10px;
    width:100%;
    background:#4f46e5;
    color:white;
    border:none;
}
</style>
</head>

<body>
<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p><a href="/register">Register</a></p>
</div>
</body>
</html>
